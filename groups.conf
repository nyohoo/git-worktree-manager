# ============================================================================
# Git Worktree Manager - リポジトリグループ定義
# ============================================================================
# 使い方: zclaude <task> @group または zadd @group
# 例: zclaude feature-api @backend
#     zadd @frontend

# ----------------------------------------------------------------------------
# プロジェクト構造例
# ----------------------------------------------------------------------------

# バックエンドサービス
backend=api-gateway,auth-service,user-service,payment-service

# フロントエンドアプリ
frontend=web-app,mobile-app,admin-panel

# フルスタック開発
fullstack=api-gateway,auth-service,web-app

# インフラストラクチャ
infra=terraform,kubernetes-configs,ansible-playbooks

# ドキュメント
docs=documentation,api-docs,user-guides

# ----------------------------------------------------------------------------
# カスタマイズ例
# ----------------------------------------------------------------------------

# プロジェクトに合わせて自由に定義してください:
#
# # マイクロサービスアーキテクチャ
# auth=auth-api,auth-frontend
# orders=order-api,order-worker,order-frontend
# payments=payment-api,payment-gateway-integration
#
# # モノレポのパッケージ
# shared=packages/shared,packages/utils,packages/types
# apps=apps/web,apps/mobile
#
# # 機能別
# user-management=user-service,auth-service,profile-service
# analytics=analytics-api,analytics-dashboard,data-pipeline
